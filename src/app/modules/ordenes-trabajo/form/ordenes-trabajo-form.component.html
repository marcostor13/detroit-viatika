<div class="p-6 max-w-2xl mx-auto">
  <div class="flex items-center gap-3 mb-8">
    <app-button variant="ghost" size="sm" label="" ariaLabel="Volver" (clicked)="goBack()">
      <app-icon name="arrow-left" size="sm" />
    </app-button>
    <div>
      <h1 class="text-2xl font-bold text-secondary">
        {{ isEditMode() ? 'Editar Orden de Trabajo' : 'Nueva Orden de Trabajo' }}
      </h1>
      <p class="text-tertiary text-sm mt-0.5">
        Relaciona la OT con un centro de costo y dale un nombre único (ej. Lim-Com-1).
      </p>
    </div>
  </div>

  @if (loading()) {
    <div class="flex justify-center items-center py-12">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
    </div>
  } @else {
    <app-card padding="lg">
      <div class="flex flex-col gap-6">
        <app-form-field #ccField label="Centro de costo" [required]="true" [error]="costCenterError()">
          <select
            [id]="ccField.fieldId"
            [attr.aria-describedby]="ccField.describedBy()"
            [ngModel]="costCenterId()"
            (ngModelChange)="onCostCenterChange($event)"
            class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary"
            [class]="costCenterError() ? 'border-error' : 'border-tertiary/30'"
          >
            <option value="" disabled>Selecciona un centro de costo</option>
            @for (cc of centrosCosto(); track cc._id) {
              <option [value]="cc._id">{{ cc.code ? cc.code + ' — ' + cc.name : cc.name }}</option>
            }
          </select>
        </app-form-field>

        <div>
          <app-form-field #nombreField label="Nombre de la OT" [required]="true" [error]="nombreError()">
            <input
              type="text"
              [id]="nombreField.fieldId"
              [attr.aria-describedby]="nombreField.describedBy()"
              [ngModel]="nombre()"
              (ngModelChange)="onNombreChange($event)"
              placeholder="Ej: Lim-Com-1"
              class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary"
              [class]="nombreError() ? 'border-error' : 'border-tertiary/30'"
            />
          </app-form-field>
          <p class="text-xs text-tertiary mt-1">
            El nombre debe ser único dentro de tu empresa.
          </p>
        </div>

        <label class="flex items-center gap-2 cursor-pointer">
          <input
            type="checkbox"
            [ngModel]="isActive()"
            (ngModelChange)="isActive.set($event)"
            class="h-4 w-4 text-primary focus:ring-primary/30 border-tertiary/30 rounded"
          />
          <span class="text-sm text-secondary">Orden de trabajo activa</span>
        </label>

        <div class="flex gap-3 pt-2">
          <app-button
            [label]="saving() ? 'Guardando...' : 'Guardar'"
            variant="primary"
            size="md"
            [disabled]="saving()"
            (clicked)="save()"
          />
          <app-button label="Cancelar" variant="secondary" size="md" [disabled]="saving()" (clicked)="goBack()" />
        </div>
      </div>
    </app-card>
  }
</div>
