<div class="p-6 lg:p-8">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
    <h2 class="text-2xl font-extrabold tracking-tight text-secondary">Gestión de Empresas (Clientes)</h2>
    <app-button label="Nueva Empresa" variant="primary" size="md" (clicked)="openNewForm()">
      <app-icon name="plus" size="sm" />
    </app-button>
  </div>

  @if (loading()) {
    <div class="flex justify-center p-12">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary"></div>
    </div>
  } @else {
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      @for (client of clients(); track client._id) {
        <app-card class="flex flex-col h-full">
          <div class="flex items-center mb-5">
            @if (client.logo) {
              <div class="w-12 h-12 rounded-lg bg-background border border-divider overflow-hidden shrink-0 mr-4">
                <img [src]="client.logo" class="w-full h-full object-contain" />
              </div>
            } @else {
              <div class="w-12 h-12 rounded-lg bg-primary/10 text-primary flex items-center justify-center shrink-0 mr-4">
                <app-icon name="building" size="md" />
              </div>
            }
            <div class="overflow-hidden">
              <h3 class="font-bold text-secondary truncate" [title]="client.comercialName">{{ client.comercialName }}</h3>
              <p class="text-xs font-semibold text-primary mt-0.5 tracking-wide">{{ client.businessId }}</p>
            </div>
          </div>
          <div class="space-y-2 mb-6 text-sm text-tertiary flex-1">
            <p class="flex items-start gap-2">
              <app-icon name="shield-check" size="sm" class="text-tertiary shrink-0" />
              <span class="truncate" [title]="client.businessName">{{ client.businessName }}</span>
            </p>
            <p class="flex items-center gap-2">
              <app-icon name="send" size="sm" class="text-tertiary shrink-0" />
              <span class="truncate" [title]="client.email">{{ client.email || '-' }}</span>
            </p>
            <p class="flex items-center gap-2">
              <app-icon name="paperclip" size="sm" class="text-tertiary shrink-0" />
              <span>{{ client.phone || '-' }}</span>
            </p>
          </div>
          <div class="flex justify-end pt-4 border-t border-divider">
            <app-button label="Editar" variant="ghost" size="sm" (clicked)="editClient(client)">
              <app-icon name="edit" size="sm" />
            </app-button>
          </div>
        </app-card>
      }
    </div>
  }

  <!-- Modal Form -->
  <app-modal [open]="showForm()" [title]="editingClient() ? 'Editar Empresa' : 'Nueva Empresa'" size="md" (closed)="closeForm()">
    <form (submit)="saveClient()" class="flex flex-col gap-5">
      <app-input label="Código" [value]="newClient.codigo ?? ''" (valueChange)="newClient.codigo = $event" [required]="true" placeholder="Ej: EMP001" />
      <app-input label="Nombre Comercial" [value]="newClient.comercialName ?? ''" (valueChange)="newClient.comercialName = $event" [required]="true" />
      <app-input label="Razón Social" [value]="newClient.businessName ?? ''" (valueChange)="newClient.businessName = $event" [required]="true" />
      <app-input label="RUC (ID de Negocio)" [value]="newClient.businessId ?? ''" (valueChange)="newClient.businessId = $event" [required]="true" />
      <app-input label="Dirección" [value]="newClient.address ?? ''" (valueChange)="newClient.address = $event" />
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <app-input label="Teléfono" [value]="newClient.phone ?? ''" (valueChange)="newClient.phone = $event" />
        <app-input label="Email" type="email" [value]="newClient.email ?? ''" (valueChange)="newClient.email = $event" />
      </div>
      <app-input label="URL del Logo" [value]="newClient.logo ?? ''" (valueChange)="newClient.logo = $event" />

      <div class="flex justify-end gap-3 mt-3 pt-6 border-t border-divider">
        <app-button label="Cancelar" variant="secondary" (clicked)="closeForm()" />
        <app-button label="Guardar" variant="primary" type="submit">
          <app-icon name="check" size="sm" />
        </app-button>
      </div>
    </form>
  </app-modal>
</div>
