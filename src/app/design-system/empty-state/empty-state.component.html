<div class="flex flex-col items-center justify-center text-center py-12 px-6">
  <div class="w-14 h-14 rounded-full bg-background flex items-center justify-center mb-4 text-tertiary">
    <app-icon [name]="icon()" size="lg" />
  </div>
  <h3 class="font-heading text-lg text-secondary mb-1">{{ title() }}</h3>
  @if (description()) {
    <p class="text-sm text-tertiary max-w-sm mb-4">{{ description() }}</p>
  }
  <ng-content></ng-content>
</div>
