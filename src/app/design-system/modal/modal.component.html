@if (open()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div
      class="absolute inset-0 bg-secondary/50 backdrop-blur-sm"
      aria-hidden="true"
      (click)="onBackdropClick()"
    ></div>
    <div
      #dialogEl
      class="relative w-full bg-quaternary rounded-2xl border border-divider shadow-soft max-h-[90vh] overflow-y-auto focus:outline-none"
      [class]="sizeClasses()"
      role="dialog"
      aria-modal="true"
      [attr.aria-label]="title() || null"
      tabindex="-1"
    >
      @if (title()) {
        <div class="flex items-center justify-between px-6 py-4 border-b border-divider">
          <h2 class="font-heading text-lg text-secondary">{{ title() }}</h2>
          <button
            type="button"
            class="text-tertiary hover:text-primary transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 rounded"
            (click)="close()"
            aria-label="Cerrar"
          >
            <app-icon name="close" size="sm" />
          </button>
        </div>
      }
      <div class="p-6">
        <ng-content></ng-content>
      </div>
    </div>
  </div>
}
